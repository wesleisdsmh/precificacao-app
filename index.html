<script>
const WORKER_URL = "https://precificacao-api.wesleisdsmh.workers.dev";

const currency = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
const percent = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const inteiro = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });

function r2(v){
  return Math.round((Number(v)||0)*100)/100
}

// regra de arredondamento dos centavos
function arredondarCentavos(valor){
  let inteiro = Math.floor(valor)
  let centavos = valor - inteiro
  return centavos >= 0.5 ? inteiro + 1 : inteiro
}

const getNum = id => parseFloat(document.getElementById(id).value) || 0
const getText = id => document.getElementById(id).value.trim()
const toRate = v => v/100

function calcular(){

  const custo = r2(getNum('custo'))
  const precoManualDigitado = document.getElementById('precoManual').value !== ''
  const precoManual = r2(getNum('precoManual'))

  const lucroPadrao = toRate(getNum('lucroPadrao'))
  const pontosPorReal = getNum('pontosPorReal')

  const gateway = toRate(getNum('gateway'))
  const imposto = toRate(getNum('imposto'))
  const sistema = toRate(getNum('sistema'))
  const fundo = toRate(getNum('fundo'))

  const n1 = toRate(getNum('n1'))
  const n2 = toRate(getNum('n2'))
  const n3 = toRate(getNum('n3'))
  const n4 = toRate(getNum('n4'))
  const n5 = toRate(getNum('n5'))
  const n6 = toRate(getNum('n6'))
  const n7 = toRate(getNum('n7'))

  const payoutMax = toRate(getNum('payoutMax'))
  const margemMin = toRate(getNum('margemMin'))

  const bonusPercent = n1+n2+n3+n4+n5+n6+n7

  const denominador =
    1 - gateway - imposto -
    ((1 - gateway - imposto) * (bonusPercent + fundo + sistema))

  const precoSugerido = r2(
    custo > 0 && denominador > 0
      ? (custo * (1 + lucroPadrao)) / denominador
      : 0
  )

  const precoBase = precoManualDigitado && precoManual > 0 ? precoManual : precoSugerido

  // 🔥 AQUI SUA REGRA DE CENTAVOS
  const precoFinal = arredondarCentavos(precoBase)

  const baseLiquida = precoFinal * (1 - gateway - imposto)

  // pontos sempre inteiro
  const pontos = Math.floor(precoFinal * pontosPorReal)

  const fundoValor = r2(baseLiquida * fundo)
  const bonusUnilevel = r2(baseLiquida * bonusPercent)
  const sistemaValor = r2(baseLiquida * sistema)

  const n1Valor = r2(baseLiquida * n1)
  const n2Valor = r2(baseLiquida * n2)
  const n3Valor = r2(baseLiquida * n3)
  const n4Valor = r2(baseLiquida * n4)
  const n5Valor = r2(baseLiquida * n5)
  const n6Valor = r2(baseLiquida * n6)
  const n7Valor = r2(baseLiquida * n7)

  const lucroLiquido = r2(
    precoFinal -
    custo -
    (precoFinal * gateway) -
    (precoFinal * imposto) -
    bonusUnilevel -
    fundoValor -
    sistemaValor
  )

  const payoutTotal = r2(fundoValor + bonusUnilevel + sistemaValor)
  const payoutPercent = precoFinal > 0 ? payoutTotal / precoFinal : 0
  const margemLiquida = precoFinal > 0 ? lucroLiquido / precoFinal : 0

  // STATUS
  let statusClasse = 'success'
  let statusTitulo = 'Saudável'
  let statusTexto = 'Produto saudável'

  if (lucroLiquido < 0 || payoutPercent > payoutMax) {
    statusClasse = 'danger'
    statusTitulo = 'Risco'
    statusTexto = 'Prejuízo ou payout alto'
  } else if (payoutPercent > 0.35 || margemLiquida < margemMin) {
    statusClasse = 'warning'
    statusTitulo = 'Atenção'
    statusTexto = 'Margem apertada'
  }

  // UI
  document.getElementById('precoSugerido').textContent = currency.format(precoSugerido)
  document.getElementById('precoFinal').textContent = currency.format(precoFinal)
  document.getElementById('pontosResumo').textContent = inteiro.format(pontos)
  document.getElementById('lucroLiquido').textContent = currency.format(lucroLiquido)
  document.getElementById('margemLiquida').textContent = percent.format(margemLiquida*100)+"%"
  document.getElementById('payoutTotal').textContent = currency.format(payoutTotal)
  document.getElementById('payoutPercent').textContent = percent.format(payoutPercent*100)+"%"

  document.getElementById('pontos').textContent = inteiro.format(pontos)
  document.getElementById('fundoValor').textContent = currency.format(fundoValor)
  document.getElementById('bonusUnilevelValor').textContent = currency.format(bonusUnilevel)
  document.getElementById('n1Valor').textContent = currency.format(n1Valor)
  document.getElementById('n2Valor').textContent = currency.format(n2Valor)
  document.getElementById('n3Valor').textContent = currency.format(n3Valor)
  document.getElementById('n4Valor').textContent = currency.format(n4Valor)
  document.getElementById('n5Valor').textContent = currency.format(n5Valor)
  document.getElementById('n6Valor').textContent = currency.format(n6Valor)
  document.getElementById('n7Valor').textContent = currency.format(n7Valor)

  document.getElementById('statusBox').className = 'status-box '+statusClasse
  document.getElementById('statusBox').innerHTML = statusTitulo+"<small>"+statusTexto+"</small>"

  return {
    destino: 'ProdutosEHistorico',
    produto: getText('produto') || 'Sem nome',
    custo,
    precoSugerido,
    precoManual: precoManualDigitado ? precoManual : '',
    precoFinal,
    lucroLiquido,
    payoutTotal,
    pontos,
    fundoValor,
    bonusUnilevel,
    n1: n1Valor,
    n2: n2Valor,
    n3: n3Valor,
    n4: n4Valor,
    n5: n5Valor,
    n6: n6Valor,
    n7: n7Valor,
    payoutPercent,
    margemLiquida,
    status: statusTitulo
  }
}

async function salvar(){
  const data = calcular()

  await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  })

  alert("Salvo na planilha")
}

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input",calcular)
})

calcular()
</script>
