<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precificação</title>

<style>
body{
  font-family:Arial;
  background:#e5e7eb;
  margin:0;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

h2{margin-top:0}

input{
  width:100%;
  padding:10px;
  margin:5px 0 10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(135deg,#f67900,#5815ae);
  color:white;
}

.metric{margin:10px 0}
.big{font-size:20px;font-weight:bold}

.success{background:#16a34a;color:white;padding:10px;border-radius:10px}
.warning{background:#f67900;color:white;padding:10px;border-radius:10px}
.danger{background:#dc2626;color:white;padding:10px;border-radius:10px}
</style>
</head>

<body>

<div class="card">
<h2>Precificação</h2>

<label>Produto</label>
<input id="produto">

<label>Custo</label>
<input id="custo" type="number" value="100">

<label>Preço manual</label>
<input id="precoManual" type="number">

<label>Lucro %</label>
<input id="lucroPadrao" type="number" value="20">

<hr>

<label>Gateway %</label>
<input id="gateway" type="number" value="4">

<label>Imposto %</label>
<input id="imposto" type="number" value="12">

<label>Sistema %</label>
<input id="sistema" type="number" value="5">

<label>Fundo %</label>
<input id="fundo" type="number" value="5">

<label>Pontos por real</label>
<input id="pontosPorReal" type="number" value="0.3">

<hr>

<label>Nível 1</label><input id="n1" type="number" value="5">
<label>Nível 2</label><input id="n2" type="number" value="4">
<label>Nível 3</label><input id="n3" type="number" value="4">
<label>Nível 4</label><input id="n4" type="number" value="2">
<label>Nível 5</label><input id="n5" type="number" value="2">
<label>Nível 6</label><input id="n6" type="number" value="2">
<label>Nível 7</label><input id="n7" type="number" value="1">

<hr>

<label>Payout máximo %</label>
<input id="payoutMax" type="number" value="45">

<label>Margem mínima %</label>
<input id="margemMin" type="number" value="10">

<button onclick="salvar()">Salvar produto</button>

</div>

<div class="card">
<h2>Resultado</h2>

<div class="metric">Preço sugerido: <span id="precoSugerido" class="big"></span></div>
<div class="metric">Preço final: <span id="precoFinal" class="big"></span></div>
<div class="metric">Pontos: <span id="pontos" class="big"></span></div>
<div class="metric">Lucro líquido: <span id="lucroLiquido" class="big"></span></div>
<div class="metric">Payout total: <span id="payoutTotal" class="big"></span></div>
<div class="metric">Payout %: <span id="payoutPercent" class="big"></span></div>
<div class="metric">Margem líquida: <span id="margemLiquida" class="big"></span></div>

<div id="status"></div>
</div>

<script>

const API = "https://precificacao-api.wesleisdsmh.workers.dev"

function r2(v){
  return Math.round((Number(v)||0)*100)/100
}

function arredondarCentavos(v){
  let i = Math.floor(v)
  let c = v - i
  return c >= 0.5 ? i+1 : i
}

function calcular(){

let custo = r2(Number(custoInput.value)||0)
let precoManual = Number(precoManualInput.value)||0
let lucro = Number(lucroPadrao.value)/100

let gateway = Number(gatewayInput.value)/100
let imposto = Number(impostoInput.value)/100
let sistema = Number(sistemaInput.value)/100
let fundo = Number(fundoInput.value)/100

let pontosPorReal = Number(pontosPorRealInput.value)

let n1v = Number(n1.value)/100
let n2v = Number(n2.value)/100
let n3v = Number(n3.value)/100
let n4v = Number(n4.value)/100
let n5v = Number(n5.value)/100
let n6v = Number(n6.value)/100
let n7v = Number(n7.value)/100

let payoutMax = Number(payoutMaxInput.value)/100
let margemMin = Number(margemMinInput.value)/100

let bonus = n1v+n2v+n3v+n4v+n5v+n6v+n7v

let denom = 1 - gateway - imposto - ((1-gateway-imposto)*(bonus+fundo+sistema))

let precoSugerido = r2((custo*(1+lucro))/denom)

let precoBase = precoManual>0 ? precoManual : precoSugerido
let precoFinal = arredondarCentavos(precoBase)

let baseLiquida = precoFinal*(1-gateway-imposto)

let pontos = Math.floor(precoFinal*pontosPorReal)

let fundoV = r2(baseLiquida*fundo)
let bonusV = r2(baseLiquida*bonus)
let sistemaV = r2(baseLiquida*sistema)

let lucroLiquido = r2(
precoFinal - custo -
(precoFinal*gateway) -
(precoFinal*imposto) -
bonusV - fundoV - sistemaV
)

let payoutTotal = r2(fundoV+bonusV+sistemaV)
let payoutPercent = payoutTotal/precoFinal
let margemLiquida = lucroLiquido/precoFinal

precoSugeridoEl.innerText = "R$ "+precoSugerido.toFixed(2)
precoFinalEl.innerText = "R$ "+precoFinal.toFixed(2)
pontosEl.innerText = pontos
lucroLiquidoEl.innerText = "R$ "+lucroLiquido.toFixed(2)
payoutTotalEl.innerText = "R$ "+payoutTotal.toFixed(2)
payoutPercentEl.innerText = (payoutPercent*100).toFixed(2)+"%"
margemLiquidaEl.innerText = (margemLiquida*100).toFixed(2)+"%"

if(lucroLiquido<0 || payoutPercent>payoutMax){
status.className="danger"
status.innerText="Risco"
}
else if(payoutPercent>0.35 || margemLiquida<margemMin){
status.className="warning"
status.innerText="Atenção"
}
else{
status.className="success"
status.innerText="Saudável"
}

return {
produto:produto.value,
custo,
precoSugerido,
precoManual,
precoFinal,
lucroLiquido,
payoutTotal,
pontos
}

}

async function salvar(){

let data = calcular()

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

alert("Salvo na planilha")
}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calcular)
})

const custoInput = document.getElementById("custo")
const precoManualInput = document.getElementById("precoManual")
const precoSugeridoEl = document.getElementById("precoSugerido")
const precoFinalEl = document.getElementById("precoFinal")
const pontosEl = document.getElementById("pontos")
const lucroLiquidoEl = document.getElementById("lucroLiquido")
const payoutTotalEl = document.getElementById("payoutTotal")
const payoutPercentEl = document.getElementById("payoutPercent")
const margemLiquidaEl = document.getElementById("margemLiquida")
const status = document.getElementById("status")

calcular()

</script>

</body>
</html>
